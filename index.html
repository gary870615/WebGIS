<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebGIS Demo 2016 Meinong EQ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; }

    /* 簡單 UI 面板 */
    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 9999;
      background: white;
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      font-family: Arial, sans-serif;
      width: 280px;
    }
    .panel h3 { margin: 0 0 8px 0; font-size: 16px; }
    .panel button {
      width: 100%;
      padding: 8px 10px;
      margin: 6px 0;
      cursor: pointer;
    }
    .panel .row { font-size: 13px; margin-top: 6px; line-height: 1.4; }
    .muted { color: #666; }
    code { background: #f4f4f4; padding: 1px 4px; border-radius: 4px; }

    /* ===== Custom Markers  ===== */
    /* 讓 divIcon 不要出現白底框 */
    .leaflet-div-icon {
      background: transparent;
      border: none;
    }

    /* GNSS固定站：藍色圓形 */
    .mkrA {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2b6cb0;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    /* GNSS移動站：紅色圓形）*/
    .mkrB {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d10a0d;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    
    /* 震央: 黃色星星 */
    .mkrEpicenter {
      font-size: 40px;
      color: #e6f60c;
      text-shadow: 0 0 2px #fff;
      -webkit-text-stroke: 1.5px #fff;
    }
    
    /* 震央: 黃色星星(圖例) */
    .legendEpicenter {
      display: inline-block;
      font-size: 28px;
      color: #e6f60c;
    }
  </style>
</head>

<body>
<div id="map"></div>

<div class="panel">
  <h3>2016美濃地震GNSS測站垂直同震位移</h3>

  <div class="row">
    資料來源：中央地質調查所
  </div>

  <button id="btnLoadAll">載入全部點位</button>
  <button id="btnLoadBbox">依目前地圖視窗 bbox 篩選</button>

  <div class="row muted" id="status">狀態：待命</div>

  <div class="row muted">
    提示：位移量正值為抬升，負值為沉陷。
  </div>

  <div class="row muted">
  圖例：
  <span style="display:inline-flex;align-items:center;gap:6px;">
    <span class="mkrA"></span> GNSS固定站
  </span>
  &nbsp;&nbsp;
  <span style="display:inline-flex;align-items:center;gap:6px;">
    <span class="mkrB"></span> GNSS移動站
  </span>
    &nbsp;&nbsp;
  <span style="display:inline-flex;align-items:center;gap:6px;">
    <span class="legendEpicenter">★</span> 地震震央
  </span>
  </div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

  // 匯入兩個檔案
  const DATA_SOURCES = [
    { label: "GNSS固定站", url: "./2016_Meinong_u_CGNSS.geojson" },
    { label: "GNSS移動站", url: "./2016_Meinong_u_SGNSS.geojson" }
  ];

  // 地震震央座標 
  const EPICENTER = {
    label: "地震震央",
    lat: 22.92,
    lon: 120.54
  };
  
  // 初始化地圖
  const map = L.map('map').setView([23.8, 121.0], 7);
  map.createPane('epicenterPane');  //為EPICENTER指定一個專屬 pane
  map.getPane('epicenterPane').style.zIndex = 650; 
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // 圖層與資料快取
  let layerControl = null;    // 右上角圖層開關
  let overlayLayers = {};     // {label: L.GeoJSON}
  let allGeoJSONs = {};       // {label: FeatureCollection}

  function setStatus(msg) {
    document.getElementById("status").textContent = "狀態：" + msg;
  }

  function clearAllLayers() {
    // 移除舊圖層
    for (const k in overlayLayers) {
      overlayLayers[k].remove();
    }
    overlayLayers = {};

    // 移除舊的 layer control
    if (layerControl) {
      map.removeControl(layerControl);
      layerControl = null;
    }
  }

  //設定測站popup
  function popupHTML(props, fallbackTitle) {
  const title = props?.GNSS ?? fallbackTitle ?? "Station";

  const lon = props?.Lon ?? "";
  const lat = props?.Lat ?? "";

  const disp = props?.["位移量"] ?? props?.Displacement ?? "";

  const dispText = (disp !== "" && Number.isFinite(Number(disp)))
    ? `${Number(disp).toFixed(2)} mm`
    : `${disp} mm`;

  return `
    <div style="min-width:105px">
      <div style="font-weight:700;font-size:14px;margin-bottom:6px">${title}</div>
      <div><b>位移量：</b>${dispText}</div>
      <div><b>Lon：</b>${lon}°</div>
      <div><b>Lat：</b>${lat}°</div>
    </div>
  `;
}

// ===== Custom divIcon for each layer =====
    const ICONS = {
      "GNSS固定站": L.divIcon({
        className: "leaflet-div-icon", // 也可用 ""，但建議保留，配合CSS
        html: '<div class="mkrA"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -8]
      }),
      "GNSS移動站": L.divIcon({
        className: "leaflet-div-icon",
        html: '<div class="mkrB"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -8]
      }),
      "地震震央": L.divIcon({
        className: "leaflet-div-icon",
        html: '<div class="mkrEpicenter">★</div>',
        iconSize: [50, 50],
        iconAnchor: [25, 25],
        popupAnchor: [0, -10]
      })
    };

  function makeGeoLayer(label, geojson) {
    return L.geoJSON(geojson, {
      // Point 用自訂 marker（不同 layer 用不同 icon）
      pointToLayer: (feature, latlng) => {
        const icon = ICONS[label] || ICONS["GNSS固定站"]; // 找不到就用 A 當預設
        return L.marker(latlng, { icon });
      },

      // 每個點綁 popup
      onEachFeature: (feature, layer) => {
        const p = feature.properties || {};
        layer.bindPopup(popupHTML(p, label)); // 原本就有 popupHTML()
      }
    });
  }

  // ===== 建立震央圖層 =====
  function makeEpicenterLayer() {
    const marker = L.marker([EPICENTER.lat, EPICENTER.lon], {
      icon: ICONS["地震震央"],
      pane: "epicenterPane"
    }).bindPopup(`
      <div style="min-width:150px">
        <div style="font-weight:700;font-size:14px;margin-bottom:6px">2016美濃地震震央</div>
        <div><b>Lon：</b>${EPICENTER.lon}°</div>
        <div><b>Lat：</b>${EPICENTER.lat}°</div>       
      </div>
    `);

    return L.featureGroup([marker]);
  }

  function unionBounds(layersObj) {
    let bounds = null;
    for (const label in layersObj) {
      const lyr = layersObj[label];
      if (!lyr || lyr.getLayers().length === 0) continue;
      const b = lyr.getBounds();
      bounds = bounds ? bounds.extend(b) : b;
    }
    return bounds;
  }

  
  function addLayersToMap(layersObj, fit = true) {
    // 加到地圖
    for (const label in layersObj) {
      layersObj[label].addTo(map);
    }

    // 右上角圖層開關
    layerControl = L.control.layers(null, layersObj, { collapsed: false }).addTo(map);

    // fit 到所有圖層的總範圍
    if (fit) {
      const b = unionBounds(layersObj);
      if (b) map.fitBounds(b, { padding: [20, 20], maxZoom: 16 });
    }
  }

  async function fetchGeoJSON(url) {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`讀取失敗 ${url} (HTTP ${res.status}): ${text}`);
    }
    const geojson = await res.json();

    // 基本檢查
    if (!geojson || geojson.type !== "FeatureCollection" || !Array.isArray(geojson.features)) {
      throw new Error(`GeoJSON 格式不正確：${url} 需要 FeatureCollection + features[]`);
    }
    return geojson;
  }

  // 依 bbox 在前端本地篩選
  function filterByMapBounds(geojson) {
    const b = map.getBounds();  // 取得地圖目前視窗範圍
    return {
      type: "FeatureCollection",
      // 把 GeoJSON 的 features 過濾掉「不在框內」的點
      features: (geojson.features || []).filter(f => {  
        if (!f || !f.geometry) return false;

        // Point：用座標判斷是否在視窗內
        if (f.geometry.type === "Point") {
          const c = f.geometry.coordinates;
          if (!Array.isArray(c) || c.length < 2) return false; //防呆
          const lon = Number(c[0]);
          const lat = Number(c[1]);
          if (!Number.isFinite(lon) || !Number.isFinite(lat)) return false; //防呆
          return b.contains([lat, lon]); // Leaflet 用 [lat, lon]
        }

        // LineString/Polygon：先不裁切，直接保留
        return true;
      })
    };
  }

  async function loadAll() {
    // 更新狀態、清掉舊圖層
    setStatus("載入兩個 GeoJSON...");
    clearAllLayers();

    // 讀兩個檔案
    const results = await Promise.all(DATA_SOURCES.map(d => fetchGeoJSON(d.url)));

    // 把原始 GeoJSON存起來（bbox 篩選用）
    allGeoJSONs = {};
    DATA_SOURCES.forEach((d, i) => {
      allGeoJSONs[d.label] = results[i];
    });

    // 建立兩個圖層
    const layersObj = {};
    DATA_SOURCES.forEach(d => {
      layersObj[d.label] = makeGeoLayer(d.label, allGeoJSONs[d.label]);
    });

    // 加入震央圖層
    layersObj[EPICENTER.label] = makeEpicenterLayer();

    overlayLayers = layersObj;   // 把圖層加到地圖 + fit 到總範圍  
    addLayersToMap(overlayLayers, true);

    // 統計總點數幾個檔，更新狀態列
    const total = Object.values(allGeoJSONs).reduce((s, g) => s + (g.features?.length || 0), 0);
    setStatus(`載入完成共 ${total} 筆資料（${DATA_SOURCES.length} 檔案）`);
  }

  async function loadBbox() {
    if (!allGeoJSONs || Object.keys(allGeoJSONs).length === 0) {
      await loadAll();
    }

    setStatus("依地圖視窗 bbox 篩選（本地）...");
    clearAllLayers();

    const layersObj = {};
    for (const d of DATA_SOURCES) {
      const filtered = filterByMapBounds(allGeoJSONs[d.label]);
      layersObj[d.label] = makeGeoLayer(d.label, filtered);
    }
    
    // bbox 模式下也保留震央圖層
    layersObj[EPICENTER.label] = makeEpicenterLayer();
    
    overlayLayers = layersObj;
    addLayersToMap(overlayLayers, false); // bbox 篩選不強制 fit
    
    setStatus("bbox 篩選完成（可用右上角圖層開關）");
  }

  // 綁按鈕
  document.getElementById("btnLoadAll").addEventListener("click", () => {
    loadAll().catch(e => { 
      setStatus("載入失敗：" + e.message); 
      alert(e.message); 
    });
  });

  document.getElementById("btnLoadBbox").addEventListener("click", () => {
    loadBbox().catch(e => { 
      setStatus("bbox 篩選失敗：" + e.message);
      alert(e.message); 
    });
  });

  // 預設先載入一次
  loadAll().catch(e => setStatus("預設載入失敗：" + e.message));
</script>
</body>
</html>
